name: "lab-kvm-to-proxmox"

source:
  address: "examples/lab/kvm"
  platform: "kvm"

target:
  address: "https://proxmox.example.local:8006/api2/json"
  platform: "proxmox"
  default_host: "pve-node-01"
  default_storage: "local-lvm"

workloads:
  - match:
      name_pattern: "*"
    overrides:
      network_map:
        default: "vmbr0"
      dependencies:
        - "inventory-baseline"

options:
  dry_run: false
  parallel: 2
  verify_boot: true
  window:
    not_before: "2026-04-05T01:00:00Z"
    not_after: "2026-04-05T05:00:00Z"
  approval:
    required: true
    ticket: "CHG-2026-0405"
  waves:
    size: 2
    dependency_aware: true
