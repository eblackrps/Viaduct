services:
  viaduct:
    image: viaduct:latest
    container_name: viaduct
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      VIADUCT_ADMIN_KEY: ${VIADUCT_ADMIN_KEY:-change-me}
    env_file:
      - ./viaduct.env.example
    volumes:
      - ./config:/config:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    command:
      - ./bin/viaduct
      - serve-api
      - --config
      - /config/config.yaml
      - --port
      - "8080"
