services:
  viaduct:
    image: viaduct:latest
    container_name: viaduct
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      VIADUCT_ADMIN_KEY: ${VIADUCT_ADMIN_KEY:-sha256:replace-with-admin-key-hash}
    env_file:
      - ./viaduct.env.example
    volumes:
      - ./config:/config:ro
    healthcheck:
      test: ["/viaduct", "healthcheck", "--url", "http://127.0.0.1:8080/readyz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    command:
      - serve-api
      - --host
      - 0.0.0.0
      - --config
      - /config/config.yaml
      - --port
      - "8080"
