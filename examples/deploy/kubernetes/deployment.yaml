apiVersion: apps/v1
kind: Deployment
metadata:
  name: viaduct
spec:
  replicas: 1
  selector:
    matchLabels:
      app: viaduct
  template:
    metadata:
      labels:
        app: viaduct
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: viaduct
          image: viaduct:latest
          args:
            - serve-api
            - --config
            - /etc/viaduct/config.yaml
            - --port
            - "8080"
          env:
            - name: VIADUCT_ADMIN_KEY
              valueFrom:
                secretKeyRef:
                  name: viaduct-secrets
                  key: admin-api-key
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: config
              mountPath: /etc/viaduct
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: viaduct-config
