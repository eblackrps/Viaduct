services:
  viaduct:
    image: ghcr.io/eblackrps/viaduct:3.2.0
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "8080:8080"
    environment:
      VIADUCT_ADMIN_KEY: ${VIADUCT_ADMIN_KEY:?set-a-plaintext-or-sha256-admin-key}
      VIADUCT_WEB_DIR: /opt/viaduct/web
      VIADUCT_OTEL_ENABLED: ${VIADUCT_OTEL_ENABLED:-false}
      VIADUCT_OTEL_ENDPOINT: ${VIADUCT_OTEL_ENDPOINT:-}
      VIADUCT_OTEL_SERVICE_NAME: ${VIADUCT_OTEL_SERVICE_NAME:-viaduct-api}
      VIADUCT_OTEL_ENVIRONMENT: ${VIADUCT_OTEL_ENVIRONMENT:-production}
      VIADUCT_OTEL_SAMPLER: ${VIADUCT_OTEL_SAMPLER:-parentbased_traceidratio}
      VIADUCT_OTEL_SAMPLER_ARG: ${VIADUCT_OTEL_SAMPLER_ARG:-1}
    command:
      - serve-api
      - --host
      - 0.0.0.0
      - --config
      - /etc/viaduct/config.yaml
      - --port
      - "8080"
    volumes:
      - viaduct-state:/var/lib/viaduct
      - ./config:/etc/viaduct:ro
    healthcheck:
      test:
        [
          "CMD",
          "/viaduct",
          "healthcheck",
          "--url",
          "http://127.0.0.1:8080/healthz",
          "--timeout",
          "5s",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

volumes:
  viaduct-state:
