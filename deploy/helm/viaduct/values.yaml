replicaCount: 1

image:
  repository: ghcr.io/eblackrps/viaduct
  tag: "3.1.0"
  pullPolicy: IfNotPresent

imagePullSecrets: []

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

config:
  existingConfigMap: viaduct-config
  mountPath: /etc/viaduct

secrets:
  existingSecret: viaduct-secrets
  adminKeyField: admin-api-key

persistence:
  enabled: true
  accessModes:
    - ReadWriteOnce
  size: 5Gi
  mountPath: /var/lib/viaduct

livenessProbe:
  path: /healthz
  initialDelaySeconds: 15
  periodSeconds: 20

readinessProbe:
  path: /readyz
  initialDelaySeconds: 5
  periodSeconds: 10
