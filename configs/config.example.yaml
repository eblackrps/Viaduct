# Copy to ~/.viaduct/config.yaml and replace the placeholder values for your environment.
# Prefer environment variables for secrets when possible.

username: ""
password: ""
insecure: false

# Leave empty to use the in-memory store for local demos.
# For persistent state, point this at PostgreSQL.
state_store_dsn: "postgres://viaduct:change-me@localhost:5432/viaduct?sslmode=disable"

# Admin API authentication is read from the process environment.
# Example: export VIADUCT_ADMIN_KEY="sha256:<admin-key-hash>"

# Optional reusable credential references for migration specs.
# Use these keys from source.credential_ref and target.credential_ref.
credentials:
  source/vcenter:
    username: "administrator@vsphere.local"
    password: "replace-me"
    insecure: true
  target/proxmox:
    username: "root@pam"
    password: "replace-me"
    insecure: true

sources:
  vmware:
    address: "https://vcenter.example.local"
    username: "administrator@vsphere.local"
    password: "replace-me"
    insecure: true
  proxmox:
    address: "https://proxmox.example.local:8006/api2/json"
    username: "root@pam"
    password: "replace-me"
    insecure: true
  hyperv:
    address: "hyperv.example.local"
    username: "administrator"
    password: "replace-me"
  kvm:
    address: "examples/lab/kvm"
  nutanix:
    address: "https://prism.example.local:9440"
    username: "admin"
    password: "replace-me"
    insecure: true

# Optional external plugins keyed by platform identifier.
# Viaduct can start executables directly or connect to an already-running gRPC plugin.
plugins:
  example: "grpc://127.0.0.1:50071"
