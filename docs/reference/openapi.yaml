openapi: 3.1.0
info:
  title: Viaduct Operator API
  version: v2
  description: >
    Stable Viaduct operator and automation endpoints. This document covers the
    release-grade API surfaces used by the packaged dashboard, CLI-assisted
    workflows, and tenant automation. It is additive and may omit internal or
    less frequently used route variants.
servers:
  - url: http://localhost:8080
paths:
  /api/v1/health:
    get:
      summary: Liveness probe
      responses:
        "200":
          description: API is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
  /api/v1/about:
    get:
      summary: Build and compatibility metadata
      responses:
        "200":
          description: Current build metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AboutResponse"
  /api/v1/ping:
    get:
      summary: Unauthenticated API reachability probe
      responses:
        "200":
          description: API is reachable without authentication
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
  /api/v1/auth/session:
    post:
      summary: Create a dashboard auth session
      description: >
        Create a same-origin dashboard session. Use `local` only with the
        packaged loopback runtime started through `viaduct start`; use tenant or
        service-account modes when an operator intentionally supplies a scoped
        key at runtime.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthSessionRequest"
      responses:
        "201":
          description: Dashboard auth session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
    delete:
      summary: Clear the current dashboard auth session
      responses:
        "200":
          description: Dashboard auth session cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionDeleteResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/auth/session/revoke:
    post:
      summary: Revoke a dashboard auth session
      security:
        - AdminAPIKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthSessionRevokeRequest"
      responses:
        "200":
          description: Dashboard auth session revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionRevokeResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/metrics:
    get:
      summary: Prometheus metrics
      responses:
        "200":
          description: Prometheus metrics payload
          content:
            text/plain:
              schema:
                type: string
  /api/v1/inventory:
    get:
      summary: Latest tenant inventory (legacy shape)
      description: >
        Compatibility route that returns the historical unpaginated inventory
        payload. The packaged dashboard uses `/api/v2/inventory` for the stable
        paginated list contract.
      deprecated: true
      security:
        - TenantAPIKey: []
        - ServiceAccountKey: []
      parameters:
        - in: query
          name: platform
          schema:
            type: string
      responses:
        "200":
          description: Latest inventory view
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoveryResult"
  /api/v1/snapshots:
    get:
      summary: List tenant discovery snapshots (legacy shape)
      description: >
        Compatibility route that returns the historical unpaginated snapshot
        list. The packaged dashboard uses `/api/v2/snapshots` for the stable
        paginated list contract.
      deprecated: true
      security:
        - TenantAPIKey: []
        - ServiceAccountKey: []
      responses:
        "200":
          description: Snapshot metadata ordered from newest to oldest
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SnapshotMeta"
  /api/v2/inventory:
    get:
      summary: Latest tenant inventory
      description: Canonical paginated inventory route used by the packaged dashboard.
      security:
        - TenantAPIKey: []
        - ServiceAccountKey: []
      parameters:
        - in: query
          name: platform
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: per_page
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        "200":
          description: Latest inventory view with pagination metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryListResponse"
  /api/v2/snapshots:
    get:
      summary: List tenant discovery snapshots
      description: Canonical paginated snapshot route used by the packaged dashboard.
      security:
        - TenantAPIKey: []
        - ServiceAccountKey: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: per_page
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        "200":
          description: Snapshot metadata ordered from newest to oldest with pagination metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnapshotListResponse"
  /api/v1/summary:
    get:
      summary: Tenant fleet summary
      security:
        - TenantAPIKey: []
        - ServiceAccountKey: []
      responses:
        "200":
          description: Summary of current tenant state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantSummary"
  /api/v1/tenants/current:
    get:
      summary: Current tenant and effective principal
      security:
        - TenantAPIKey: []
        - ServiceAccountKey: []
      responses:
        "200":
          description: Effective tenant and auth context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentTenant"
  /api/v1/audit:
    get:
      summary: Tenant audit events
      security:
        - TenantAPIKey: []
        - ServiceAccountKey: []
      responses:
        "200":
          description: Audit events for the current tenant
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditEvent"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/service-accounts:
    get:
      summary: List tenant service accounts
      security:
        - TenantAPIKey: []
        - ServiceAccountKey: []
      responses:
        "200":
          description: Service accounts for the current tenant
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ServiceAccount"
    post:
      summary: Create a tenant service account
      security:
        - TenantAPIKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceAccountCreateRequest"
      responses:
        "201":
          description: Service account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceAccount"
  /api/v1/service-accounts/{serviceAccountID}/rotate:
    post:
      summary: Rotate a tenant service-account API key
      security:
        - TenantAPIKey: []
      parameters:
        - in: path
          name: serviceAccountID
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                api_key:
                  type: string
      responses:
        "200":
          description: Service account rotated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceAccount"
  /api/v1/preflight:
    post:
      summary: Run migration preflight checks
      security:
        - TenantAPIKey: []
        - ServiceAccountKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Preflight report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreflightReport"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/migrations:
    get:
      summary: List tenant migrations (legacy shape)
      description: >
        Compatibility route that returns the historical unpaginated migration
        list. The packaged dashboard uses `/api/v2/migrations` for the stable
        paginated list contract.
      deprecated: true
      security:
        - TenantAPIKey: []
        - ServiceAccountKey: []
      responses:
        "200":
          description: Migration history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MigrationMeta"
    post:
      summary: Create or plan a migration
      security:
        - TenantAPIKey: []
        - ServiceAccountKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "202":
          description: Migration plan accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MigrationState"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
  /api/v2/migrations:
    get:
      summary: List tenant migrations
      description: Canonical paginated migration route used by the packaged dashboard.
      security:
        - TenantAPIKey: []
        - ServiceAccountKey: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: per_page
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        "200":
          description: Migration history with pagination metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MigrationListResponse"
    post:
      summary: Create or plan a migration
      security:
        - TenantAPIKey: []
        - ServiceAccountKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "202":
          description: Migration plan accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MigrationState"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/migrations/{migrationID}:
    get:
      summary: Get migration state
      security:
        - TenantAPIKey: []
        - ServiceAccountKey: []
      parameters:
        - in: path
          name: migrationID
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Migration state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MigrationState"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/migrations/{migrationID}/execute:
    post:
      summary: Start an approved migration run
      security:
        - TenantAPIKey: []
        - ServiceAccountKey: []
      parameters:
        - in: path
          name: migrationID
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MigrationExecutionRequest"
      responses:
        "202":
          description: Execution accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MigrationCommandResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/migrations/{migrationID}/resume:
    post:
      summary: Resume a paused or failed migration run
      security:
        - TenantAPIKey: []
        - ServiceAccountKey: []
      parameters:
        - in: path
          name: migrationID
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MigrationExecutionRequest"
      responses:
        "202":
          description: Resume accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MigrationCommandResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/migrations/{migrationID}/rollback:
    post:
      summary: Roll back a migration run
      security:
        - TenantAPIKey: []
        - ServiceAccountKey: []
      parameters:
        - in: path
          name: migrationID
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Rollback result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RollbackResult"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/reports/{name}:
    get:
      summary: Export tenant report
      security:
        - TenantAPIKey: []
        - ServiceAccountKey: []
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
            enum: [summary, migrations, audit]
        - in: query
          name: format
          schema:
            type: string
            enum: [json, csv]
      responses:
        "200":
          description: Requested report
          content:
            application/json:
              schema:
                type: object
            text/csv:
              schema:
                type: string
  /api/v1/workspaces:
    get:
      summary: List pilot workspaces
      security:
        - TenantAPIKey: []
        - ServiceAccountKey: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Saved pilot workspaces
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PilotWorkspace"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
    post:
      summary: Create a pilot workspace
      security:
        - TenantAPIKey: []
        - ServiceAccountKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkspaceCreateRequest"
      responses:
        "201":
          description: Pilot workspace created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PilotWorkspace"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/workspaces/{workspaceID}:
    get:
      summary: Get a pilot workspace
      security:
        - TenantAPIKey: []
        - ServiceAccountKey: []
      parameters:
        - in: path
          name: workspaceID
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Pilot workspace state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PilotWorkspace"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
    delete:
      summary: Delete a pilot workspace
      security:
        - TenantAPIKey: []
        - ServiceAccountKey: []
      parameters:
        - in: path
          name: workspaceID
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Pilot workspace deleted
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
    patch:
      summary: Update pilot workspace state
      security:
        - TenantAPIKey: []
        - ServiceAccountKey: []
      parameters:
        - in: path
          name: workspaceID
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkspaceUpdateRequest"
      responses:
        "200":
          description: Updated pilot workspace state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PilotWorkspace"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/workspaces/{workspaceID}/jobs:
    get:
      summary: List persisted pilot workspace jobs
      security:
        - TenantAPIKey: []
        - ServiceAccountKey: []
      parameters:
        - in: path
          name: workspaceID
          required: true
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Persisted background jobs for the workspace
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkspaceJob"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
    post:
      summary: Create a persisted pilot workspace job
      security:
        - TenantAPIKey: []
        - ServiceAccountKey: []
      parameters:
        - in: path
          name: workspaceID
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkspaceJobCreateRequest"
      responses:
        "202":
          description: Workspace job accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceJob"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/workspaces/{workspaceID}/jobs/{jobID}:
    get:
      summary: Get pilot workspace job status
      security:
        - TenantAPIKey: []
        - ServiceAccountKey: []
      parameters:
        - in: path
          name: workspaceID
          required: true
          schema:
            type: string
        - in: path
          name: jobID
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Pilot workspace job state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceJob"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/workspaces/{workspaceID}/reports/export:
    post:
      summary: Export a pilot workspace report
      security:
        - TenantAPIKey: []
        - ServiceAccountKey: []
      parameters:
        - in: path
          name: workspaceID
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkspaceReportExportRequest"
      responses:
        "200":
          description: Exported pilot workspace report document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceReportDocument"
            text/markdown:
              schema:
                type: string
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
components:
  securitySchemes:
    TenantAPIKey:
      type: apiKey
      in: header
      name: X-API-Key
    ServiceAccountKey:
      type: apiKey
      in: header
      name: X-Service-Account-Key
    AdminAPIKey:
      type: apiKey
      in: header
      name: X-Admin-Key
  responses:
    ErrorResponse:
      description: Structured API error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorEnvelope"
  schemas:
    ApiFieldError:
      type: object
      properties:
        path:
          type: string
        message:
          type: string
    ApiError:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        request_id:
          type: string
        retryable:
          type: boolean
        details:
          type: object
          additionalProperties: true
        field_errors:
          type: array
          items:
            $ref: "#/components/schemas/ApiFieldError"
    ApiErrorEnvelope:
      type: object
      properties:
        error:
          $ref: "#/components/schemas/ApiError"
    AuthSessionRequest:
      type: object
      properties:
        mode:
          type: string
          enum: [local, tenant, service-account]
        api_key:
          type: string
        remember:
          type: boolean
    AuthSessionResponse:
      type: object
      properties:
        session_id:
          type: string
        mode:
          type: string
          enum: [local, tenant, service-account]
        expires_at:
          type: string
          format: date-time
    AuthSessionDeleteResponse:
      type: object
      properties:
        status:
          type: string
    AuthSessionRevokeRequest:
      type: object
      required: [session_id]
      properties:
        session_id:
          type: string
    AuthSessionRevokeResponse:
      type: object
      properties:
        status:
          type: string
        session_id:
          type: string
    AboutResponse:
      type: object
      properties:
        name:
          type: string
        api_version:
          type: string
        version:
          type: string
        commit:
          type: string
        built_at:
          type: string
        go_version:
          type: string
        plugin_protocol:
          type: string
        supported_platforms:
          type: array
          items:
            type: string
        supported_permissions:
          type: array
          items:
            type: string
        store_backend:
          type: string
        store_schema_version:
