  <text x="106" y="236" fill="#9EB7C7" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700">DEFAULT FLOW</text>
  <text x="106" y="262" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Authenticate, create a workspace, discover, inspect, simulate, plan, and export.</text>

