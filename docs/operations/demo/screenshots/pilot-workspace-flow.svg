  <text x="420" y="676" fill="#102231" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Source, target, and plan defaults</text>
  <text x="420" y="706" fill="#5A7181" font-family="Segoe UI, Arial, sans-serif" font-size="14">Lab KVM at examples/lab/kvm, credential ref lab-kvm, target proxmox, host pve-node-01, storage local-lvm, network vmbr0.</text>
  <text x="420" y="734" fill="#5A7181" font-family="Segoe UI, Arial, sans-serif" font-size="14">Plan defaults keep approval required, verify boot, parallel 2, and dependency-aware wave planning explicit.</text>

