  <rect x="304" y="86" width="176" height="34" rx="17" fill="#E7F3F9"/>
  <text x="327" y="108" fill="#1F657E" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Service-account first</text>
