version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3

  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      web-runtime:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
          - "lucide-react"
          - "d3"
          - "recharts"
      web-tooling:
        patterns:
          - "vite"
          - "@vitejs/plugin-react"
          - "typescript"
          - "tailwindcss"
          - "postcss"
          - "autoprefixer"
          - "concurrently"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    ignore:
      - dependency-name: "golang"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "node"
        update-types:
          - "version-update:semver-major"
