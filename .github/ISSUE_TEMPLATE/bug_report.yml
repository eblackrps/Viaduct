name: Bug Report
description: Report a defect in discovery, migration, lifecycle, or project tooling.
title: "[bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Viaduct. Please provide enough detail to reproduce the issue.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: A concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
      description: List the exact steps needed to reproduce the issue.
      placeholder: |
        1. Run ...
        2. Connect to ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: What happened instead?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or Commit
      placeholder: main, a tag, or a commit SHA
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Go version, OS, hypervisor platform, and any relevant config details.
