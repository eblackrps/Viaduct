name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  web-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20.20.0"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install Web Dependencies
        run: npm ci

      - name: Run Frontend Lint
        run: npm run lint -- --max-warnings=0

      - name: Run Frontend Format Check
        run: npm run format

      - name: Run Frontend Tests
        run: npm run test

  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6
        with:
          node-version: "20.20.0"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install Web Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Fixture End-To-End Tests
        run: npm run e2e:fixture

      - name: Run Real Runtime Smoke
        run: npm run e2e:runtime

      - name: Upload Playwright Report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: web/playwright-report
          if-no-files-found: ignore

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6
        with:
          node-version: "20.20.0"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          args: --timeout=5m

      - name: Install Gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@v2.22.9

      - name: Run Gosec
        run: |
          "$(go env GOPATH)/bin/gosec" ./...

      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Regenerate OpenAPI JSON
        run: go run ./scripts/openapi_generate

      - name: Verify OpenAPI JSON Is Committed
        run: git diff --exit-code -- docs/swagger.json

      - name: Run Release Gate
        run: make release-gate

      - name: Upload Release Bundle
        uses: actions/upload-artifact@v7
        with:
          name: viaduct-release-bundle
          path: dist/**
          if-no-files-found: error
