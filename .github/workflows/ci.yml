name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  workflow-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run actionlint
        run: make workflow-lint

  web-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20.20.0"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install Web Dependencies
        run: npm ci

      - name: Run Frontend Lint
        run: npm run lint -- --max-warnings=0

      - name: Run Frontend Format Check
        run: npm run format

      - name: Run Frontend Tests
        run: npm run test

  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6
        with:
          node-version: "20.20.0"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install Web Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Fixture End-To-End Tests
        run: npm run e2e:fixture

      - name: Run Real Runtime Smoke
        run: npm run e2e:runtime

      - name: Upload Playwright Report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: web/playwright-report
          if-no-files-found: ignore

  observability-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6
        with:
          node-version: "20.20.0"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Build Dashboard Assets
        run: make web-build

      - name: Build Viaduct
        run: make build

      - name: Start Local Observability Stack
        run: make observability-up

      - name: Start Viaduct With Telemetry
        env:
          VIADUCT_OTEL_ENABLED: "true"
          VIADUCT_OTEL_ENDPOINT: http://127.0.0.1:4318
          VIADUCT_OTEL_SERVICE_NAME: viaduct-api
          VIADUCT_OTEL_ENVIRONMENT: ci
          VIADUCT_OTEL_SAMPLER: always_on
        run: ./bin/viaduct start --detach --open-browser=false

      - name: Validate Trace Ingestion
        run: make observability-validate

      - name: Capture Observability Artifacts
        if: failure()
        run: |
          mkdir -p artifacts/observability
          ./bin/viaduct status --runtime > artifacts/observability/status.txt 2>&1 || true
          ./bin/viaduct doctor > artifacts/observability/doctor.txt 2>&1 || true
          cp -R "$HOME/.viaduct/runtime" artifacts/observability/runtime || true
          docker compose -f deploy/observability/docker-compose.yml logs --no-color > artifacts/observability/compose.log || true

      - name: Upload Observability Artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: observability-smoke-artifacts
          path: artifacts/observability
          if-no-files-found: ignore

      - name: Stop Viaduct
        if: always()
        run: ./bin/viaduct stop || true

      - name: Stop Local Observability Stack
        if: always()
        run: make observability-down

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6
        with:
          node-version: "20.20.0"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          args: --timeout=5m

      - name: Install Gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@v2.22.9

      - name: Run Gosec
        run: |
          "$(go env GOPATH)/bin/gosec" ./...

      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Regenerate OpenAPI JSON
        run: go run ./scripts/openapi_generate

      - name: Verify OpenAPI JSON Is Committed
        run: git diff --exit-code -- docs/swagger.json

      - name: Verify Release Surfaces
        run: make release-surface-check

      - name: Run Release Gate
        run: make release-gate

      - name: Upload Release Bundle
        uses: actions/upload-artifact@v7
        with:
          name: viaduct-release-bundle
          path: dist/**
          if-no-files-found: error
