name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish, including the leading v (for example v2.5.0)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/viaduct

jobs:
  dispatch-identity-dry-run:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Verify Dispatch Tag Identity Shape
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_TAG="${{ inputs.tag }}"
          if [[ -z "${RELEASE_TAG}" ]]; then
            echo "workflow_dispatch inputs.tag is required" >&2
            exit 1
          fi
          COSIGN_CERTIFICATE_IDENTITY="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/release.yml@refs/tags/${RELEASE_TAG}"
          echo "COSIGN_CERTIFICATE_IDENTITY=${COSIGN_CERTIFICATE_IDENTITY}"
          [[ "${COSIGN_CERTIFICATE_IDENTITY}" =~ ^https://github\.com/.+/.+/.github/workflows/release\.yml@refs/tags/v[0-9]+(\.[0-9]+)*$ ]]

  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Derive Release Metadata
        id: release_meta
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_TAG="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            RELEASE_TAG="${{ inputs.tag }}"
          fi
          if [[ -z "${RELEASE_TAG}" ]]; then
            echo "release tag is required" >&2
            exit 1
          fi
          echo "RELEASE_TAG=${RELEASE_TAG}" >> "$GITHUB_ENV"
          echo "PACKAGE_VERSION=${RELEASE_TAG#v}" >> "$GITHUB_ENV"
          echo "RELEASE_NOTES_PATH=docs/releases/${RELEASE_TAG}.md" >> "$GITHUB_ENV"
          CERTIFICATE_IDENTITY_REF="refs/tags/${RELEASE_TAG}"
          echo "COSIGN_CERTIFICATE_IDENTITY=https://github.com/${GITHUB_REPOSITORY}/.github/workflows/release.yml@${CERTIFICATE_IDENTITY_REF}" >> "$GITHUB_ENV"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "package_version=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6
        with:
          node-version: "20.20.0"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Build Cross-Platform Release Bundles
        shell: bash
        run: |
          set -euo pipefail
          make package-release-matrix VERSION="${RELEASE_TAG}"

      - name: Verify Expected Release Artifacts
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          expected_artifacts=(
            "dist/viaduct_${PACKAGE_VERSION}_linux_amd64.tar.gz"
            "dist/viaduct_${PACKAGE_VERSION}_linux_arm64.tar.gz"
            "dist/viaduct_${PACKAGE_VERSION}_darwin_arm64.tar.gz"
            "dist/viaduct_${PACKAGE_VERSION}_windows_amd64.tar.gz"
          )
          actual_artifacts=(dist/viaduct_${PACKAGE_VERSION}_*.tar.gz)
          expected_count=${#expected_artifacts[@]}
          actual_count=${#actual_artifacts[@]}
          missing=0
          for artifact in "${expected_artifacts[@]}"; do
            if [[ ! -f "${artifact}" ]]; then
              echo "::error file=.github/workflows/release.yml::missing expected release artifact ${artifact}"
              missing=1
            fi
          done
          if [[ ${actual_count} -ne ${expected_count} ]]; then
            echo "::error file=.github/workflows/release.yml::release artifact count ${actual_count} did not match expected ${expected_count}"
            printf 'actual artifacts:\n%s\n' "${actual_artifacts[@]}"
            missing=1
          fi
          if [[ ${missing} -ne 0 ]]; then
            exit 1
          fi

      - name: Extract Release Notes
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f "${RELEASE_NOTES_PATH}" ]]; then
            cp "${RELEASE_NOTES_PATH}" dist/release-notes.md
          else
            python -c "import os, re; from pathlib import Path; version = os.environ['PACKAGE_VERSION']; changelog = Path('CHANGELOG.md').read_text(encoding='utf-8'); match = re.search(rf'## \\[{re.escape(version)}\\][^\\n]*\\n(.*?)(?=\\n## \\[|\\Z)', changelog, re.S); notes = match.group(1).strip() if match else 'See CHANGELOG.md for release details.'; Path('dist/release-notes.md').write_text(notes + '\\n', encoding='utf-8')"
          fi

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0.24.0

      - name: Generate CycloneDX SBOM
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${PACKAGE_VERSION}"
          syft dir:. -o cyclonedx-json="dist/viaduct_${VERSION}_sbom.cdx.json"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.1

      - name: Sign Release Artifacts
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          artifacts=(dist/*.tar.gz dist/*.zip dist/*.cdx.json)
          if [[ ${#artifacts[@]} -eq 0 ]]; then
            echo "no release artifacts found in dist/" >&2
            exit 1
          fi
          for artifact in "${artifacts[@]}"; do
            bundle="${artifact}.sigstore.json"
            cosign sign-blob --yes \
              --bundle "${bundle}" \
              "${artifact}"
            ARTIFACT_PATH="${artifact}" BUNDLE_PATH="${bundle}" python -c "import json, os, textwrap; from pathlib import Path; bundle = Path(os.environ['BUNDLE_PATH']); data = json.loads(bundle.read_text(encoding='utf-8')); Path(os.environ['ARTIFACT_PATH'] + '.sig').write_text(data['messageSignature']['signature'] + '\\n', encoding='utf-8'); cert = data['verificationMaterial']['certificate']['rawBytes']; pem = '-----BEGIN CERTIFICATE-----\\n' + '\\n'.join(textwrap.wrap(cert, 64)) + '\\n-----END CERTIFICATE-----\\n'; Path(os.environ['ARTIFACT_PATH'] + '.pem').write_text(pem, encoding='utf-8')"
            cosign verify-blob \
              --certificate "${artifact}.pem" \
              --signature "${artifact}.sig" \
              --certificate-identity "${COSIGN_CERTIFICATE_IDENTITY}" \
              --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
              "${artifact}"
            rm -f "${bundle}"
          done
          checksum_inputs=("${artifacts[@]}" dist/*.sig dist/*.pem)
          sha256sum "${checksum_inputs[@]}" | sed 's#  dist/#  #' > dist/SHA256SUMS
          bundle="dist/SHA256SUMS.sigstore.json"
          cosign sign-blob --yes \
            --bundle "${bundle}" \
            dist/SHA256SUMS
          ARTIFACT_PATH="dist/SHA256SUMS" BUNDLE_PATH="${bundle}" python -c "import json, os, textwrap; from pathlib import Path; bundle = Path(os.environ['BUNDLE_PATH']); data = json.loads(bundle.read_text(encoding='utf-8')); Path(os.environ['ARTIFACT_PATH'] + '.sig').write_text(data['messageSignature']['signature'] + '\\n', encoding='utf-8'); cert = data['verificationMaterial']['certificate']['rawBytes']; pem = '-----BEGIN CERTIFICATE-----\\n' + '\\n'.join(textwrap.wrap(cert, 64)) + '\\n-----END CERTIFICATE-----\\n'; Path(os.environ['ARTIFACT_PATH'] + '.pem').write_text(pem, encoding='utf-8')"
          cosign verify-blob \
            --certificate dist/SHA256SUMS.pem \
            --signature dist/SHA256SUMS.sig \
            --certificate-identity "${COSIGN_CERTIFICATE_IDENTITY}" \
            --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
            dist/SHA256SUMS
          rm -f "${bundle}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          release_assets=(dist/viaduct_*.tar.gz dist/viaduct_*.zip dist/SHA256SUMS dist/*.cdx.json dist/*.sig dist/*.pem)
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --title "Viaduct ${RELEASE_TAG}" \
              --latest \
              --notes-file dist/release-notes.md
            gh release upload "${RELEASE_TAG}" --clobber "${release_assets[@]}"
          else
            gh release create "${RELEASE_TAG}" \
              --title "Viaduct ${RELEASE_TAG}" \
              --latest \
              --notes-file dist/release-notes.md \
              "${release_assets[@]}"
          fi

      - name: Verify Published Bundle Checksums Before Docker Build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          rm -rf .release-verify
          mkdir -p .release-verify
          gh release download "${RELEASE_TAG}" --pattern "SHA256SUMS" --dir .release-verify --clobber
          gh release download "${RELEASE_TAG}" --pattern "viaduct_${PACKAGE_VERSION}_linux_amd64.tar.gz" --dir .release-verify --clobber
          gh release download "${RELEASE_TAG}" --pattern "viaduct_${PACKAGE_VERSION}_linux_arm64.tar.gz" --dir .release-verify --clobber
          (
            cd .release-verify
            sha256sum -c --ignore-missing SHA256SUMS
          )
          mkdir -p .release-verify/extracted/linux-amd64 .release-verify/extracted/linux-arm64
          tar -xzf ".release-verify/viaduct_${PACKAGE_VERSION}_linux_amd64.tar.gz" -C .release-verify/extracted/linux-amd64
          tar -xzf ".release-verify/viaduct_${PACKAGE_VERSION}_linux_arm64.tar.gz" -C .release-verify/extracted/linux-arm64
          AMD64_RELEASE_BINARY="$(find .release-verify/extracted/linux-amd64 -type f \( -name viaduct -o -name viaduct-linux-amd64 \) | head -n 1)"
          ARM64_RELEASE_BINARY="$(find .release-verify/extracted/linux-arm64 -type f \( -name viaduct -o -name viaduct-linux-arm64 \) | head -n 1)"
          if [[ -z "${AMD64_RELEASE_BINARY}" || -z "${ARM64_RELEASE_BINARY}" ]]; then
            echo "failed to locate extracted release binaries for checksum verification" >&2
            exit 1
          fi
          sha256sum bin/viaduct-linux-amd64 "${AMD64_RELEASE_BINARY}"
          sha256sum bin/viaduct-linux-arm64 "${ARM64_RELEASE_BINARY}"
          diff <(sha256sum bin/viaduct-linux-amd64 | cut -d' ' -f1) <(sha256sum "${AMD64_RELEASE_BINARY}" | cut -d' ' -f1)
          diff <(sha256sum bin/viaduct-linux-arm64 | cut -d' ' -f1) <(sha256sum "${ARM64_RELEASE_BINARY}" | cut -d' ' -f1)

      - name: Prepare Release Image Context
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .release-image
          mkdir -p .release-image
          cp bin/viaduct-linux-amd64 .release-image/viaduct-linux-amd64
          cp bin/viaduct-linux-arm64 .release-image/viaduct-linux-arm64
          cp -R web/dist .release-image/web
          cp -R configs .release-image/configs
          cp -R docs .release-image/docs
          cp -R examples .release-image/examples
          cat > .release-image/Dockerfile <<'EOF'
          FROM alpine:3.20 AS release-binary
          ARG TARGETARCH
          COPY viaduct-linux-amd64 /out/viaduct-linux-amd64
          COPY viaduct-linux-arm64 /out/viaduct-linux-arm64
          RUN cp "/out/viaduct-linux-${TARGETARCH}" /out/viaduct

          FROM debian:bookworm-slim
          RUN apt-get update \
            && apt-get install -y --no-install-recommends ca-certificates curl \
            && rm -rf /var/lib/apt/lists/*
          RUN useradd --create-home --home-dir /home/viaduct --shell /usr/sbin/nologin viaduct
          WORKDIR /opt/viaduct

          COPY --from=release-binary /out/viaduct /usr/local/bin/viaduct
          COPY web /opt/viaduct/web
          COPY configs /opt/viaduct/configs
          COPY docs /opt/viaduct/docs
          COPY examples /opt/viaduct/examples

          ENV HOME=/home/viaduct
          EXPOSE 8080
          HEALTHCHECK --interval=30s --timeout=5s --start-period=15s --retries=3 CMD ["/usr/bin/curl", "-fsS", "http://127.0.0.1:8080/readyz"]
          USER viaduct

          ENTRYPOINT ["viaduct"]
          CMD ["serve-api", "--port", "8080"]
          EOF

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build And Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .release-image
          file: .release-image/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.release_meta.outputs.release_tag }}
            ${{ env.IMAGE_NAME }}:${{ steps.release_meta.outputs.package_version }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Sign Docker Image Tags
        shell: bash
        run: |
          set -euo pipefail
          cosign sign --yes "${IMAGE_NAME}:${RELEASE_TAG}"
          cosign sign --yes "${IMAGE_NAME}:${PACKAGE_VERSION}"
          cosign sign --yes "${IMAGE_NAME}:latest"
