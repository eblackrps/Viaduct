name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/viaduct

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Derive Release Metadata
        id: release_meta
        shell: bash
        run: |
          echo "PACKAGE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          echo "RELEASE_NOTES_PATH=docs/releases/${GITHUB_REF_NAME}.md" >> "$GITHUB_ENV"
          echo "package_version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6
        with:
          node-version: "20.20.0"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Build Cross-Platform Release Bundles
        run: make package-release-matrix VERSION="${GITHUB_REF_NAME}"

      - name: Extract Release Notes
        shell: bash
        run: |
          if [[ -f "${RELEASE_NOTES_PATH}" ]]; then
            cp "${RELEASE_NOTES_PATH}" dist/release-notes.md
          else
            python - <<'PY'
            import os
            import re
            from pathlib import Path

            version = os.environ["PACKAGE_VERSION"]
            changelog = Path("CHANGELOG.md").read_text(encoding="utf-8")
            match = re.search(rf"## \[{re.escape(version)}\][^\n]*\n(.*?)(?=\n## \[|\Z)", changelog, re.S)
            notes = match.group(1).strip() if match else "See CHANGELOG.md for release details."
            Path("dist/release-notes.md").write_text(notes + "\n", encoding="utf-8")
            PY
          fi

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build And Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.IMAGE_NAME }}:${{ steps.release_meta.outputs.package_version }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0.24.0

      - name: Generate CycloneDX SBOM
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          syft dir:. -o cyclonedx-json="dist/viaduct_${VERSION}_sbom.cdx.json"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.1

      - name: Sign Release Artifacts
        shell: bash
        run: |
          set -euo pipefail
          for artifact in dist/*.tar.gz dist/SHA256SUMS dist/*.cdx.json; do
            cosign sign-blob --yes \
              --output-signature "${artifact}.sig" \
              --output-certificate "${artifact}.pem" \
              "${artifact}"
          done
          cosign sign --yes "${IMAGE_NAME}:${GITHUB_REF_NAME}"
          cosign sign --yes "${IMAGE_NAME}:${PACKAGE_VERSION}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "Viaduct ${GITHUB_REF_NAME}" \
            --latest \
            --notes-file dist/release-notes.md \
            dist/viaduct_*.tar.gz \
            dist/SHA256SUMS \
            dist/*.cdx.json \
            dist/*.sig \
            dist/*.pem
