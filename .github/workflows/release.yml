# Canonical tag publishing lives in image.yml.
# Keep this file as a non-publishing guard so old bookmarks and manual dispatches
# cannot recreate a competing release pipeline with a different signing identity.
name: Release Workflow Guard

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag that should be published through image.yml, including the leading v"
        required: false
        type: string

permissions:
  contents: read

jobs:
  canonical-release-only:
    runs-on: ubuntu-latest
    steps:
      - name: Fail With Canonical Workflow Guidance
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${{ inputs.tag }}" ]]; then
            echo "requested tag: ${{ inputs.tag }}"
          fi
          echo "::error title=Canonical release workflow::Use .github/workflows/image.yml on a v* tag. release.yml is a guard only and must not publish images, signatures, SBOMs, provenance, Docker Hub mirrors, or GitHub releases."
          exit 1
